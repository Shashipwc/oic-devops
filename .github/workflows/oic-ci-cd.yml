name: OIC Deploy SIT to Target

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target Environment (dev/uat/prod)"
        required: true
        default: "uat"
      integration:
        description: "Integration (e.g. INTG1|01.00.0000)"
        required: true

env:
  EXPORT_FILE: integration.iar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Show Inputs
      - name: Show Inputs
        run: |
          echo "Target Env: ${{ github.event.inputs.target_env }}"
          echo "Integration: ${{ github.event.inputs.integration }}"

      # ✅ Parse Integration
      - name: Parse Integration
        run: |
          NAME=$(echo "${{ github.event.inputs.integration }}" | cut -d'|' -f1)
          VERSION=$(echo "${{ github.event.inputs.integration }}" | cut -d'|' -f2)

          echo "INTEGRATION_NAME=$NAME" >> $GITHUB_ENV
          echo "INTEGRATION_VERSION=$VERSION" >> $GITHUB_ENV

      # ✅ SOURCE = SIT (always)
      - name: Set Source (SIT)
        run: |
          echo "SRC_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
          echo "SRC_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
          echo "SRC_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV

      # ✅ TARGET = based on input
      - name: Set Target
        run: |
          ENV="${{ github.event.inputs.target_env }}"

          if [ "$ENV" = "prod" ]; then
            echo "TGT_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
            echo "TGT_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
            echo "TGT_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV

          elif [ "$ENV" = "uat" ]; then
            echo "TGT_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
            echo "TGT_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
            echo "TGT_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV

          elif [ "$ENV" = "dev" ]; then
            echo "TGT_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
            echo "TGT_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
            echo "TGT_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV

          else
            echo "❌ Invalid target_env: $ENV"
            exit 1
          fi

      # ✅ Validate URLs (IMPORTANT)
      - name: Validate URLs
        run: |
          echo "Source URL: $SRC_OIC_URL"
          echo "Target URL: $TGT_OIC_URL"

          if [ -z "$SRC_OIC_URL" ] || [ -z "$TGT_OIC_URL" ]; then
            echo "❌ Missing OIC URLs. Check secrets."
            exit 1
          fi

      # ✅ Export from SIT
      - name: Export from SIT
        run: |
          echo "Exporting from SIT..."

          curl --fail \
          -u "$SRC_USER:$SRC_PASS" \
          -X GET "$SRC_OIC_URL/ic/api/integration/v1/integrations/$INTEGRATION_NAME|$INTEGRATION_VERSION/archive" \
          -H "Accept: application/octet-stream" \
          -o $EXPORT_FILE

      # ✅ Validate Export
      - name: Validate Export
        run: |
          if [ ! -f "$EXPORT_FILE" ]; then
            echo "❌ Export failed"
            exit 1
          fi
          ls -lh $EXPORT_FILE

      # ✅ Import into Target
      - name: Import to Target
        run: |
          echo "Importing to ${{ github.event.inputs.target_env }}..."

          curl --fail \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/archive" \
          -H "Content-Type: multipart/form-data" \
          -F "file=@$EXPORT_FILE"

      # ✅ Activate in Target
      - name: Activate in Target
        run: |
          echo "Activating in ${{ github.event.inputs.target_env }}..."

          curl --fail \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/$INTEGRATION_NAME|$INTEGRATION_VERSION/activate"

      # ✅ Done
      - name: Done
        run: |
          echo "✅ Successfully deployed from SIT to ${{ github.event.inputs.target_env }}"
