name: OIC Deploy (Any Env to Any Env)

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source Environment (dev/sit/uat/prod)"
        required: true
        default: "sit"
      target_env:
        description: "Target Environment (dev/sit/uat/prod)"
        required: true
        default: "uat"
      integration:
        description: "Integration (e.g. INTG1|01.00.0000)"
        required: true

env:
  EXPORT_FILE: integration.iar

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Show Inputs
      - name: Show Inputs
        run: |
          echo "Source: ${{ github.event.inputs.source_env }}"
          echo "Target: ${{ github.event.inputs.target_env }}"
          echo "Integration: ${{ github.event.inputs.integration }}"

      # ❌ Prevent same environment deployment
      - name: Validate Environments
        run: |
          if [ "${{ github.event.inputs.source_env }}" = "${{ github.event.inputs.target_env }}" ]; then
            echo "❌ Source and Target cannot be same"
            exit 1
          fi

      # ✅ Parse Integration
      - name: Parse Integration
        run: |
          NAME=$(echo "${{ github.event.inputs.integration }}" | cut -d'|' -f1)
          VERSION=$(echo "${{ github.event.inputs.integration }}" | cut -d'|' -f2)

          echo "INTEGRATION_NAME=$NAME" >> $GITHUB_ENV
          echo "INTEGRATION_VERSION=$VERSION" >> $GITHUB_ENV

      # ✅ Set SOURCE credentials
      - name: Set Source Credentials
        run: |
          SRC="${{ github.event.inputs.source_env }}"

          case "$SRC" in
            dev)
              echo "SRC_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            sit)
              echo "SRC_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            uat)
              echo "SRC_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            prod)
              echo "SRC_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ Invalid source_env"
              exit 1
              ;;
          esac

      # ✅ Set TARGET credentials
      - name: Set Target Credentials
        run: |
          TGT="${{ github.event.inputs.target_env }}"

          case "$TGT" in
            dev)
              echo "TGT_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            sit)
              echo "TGT_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            uat)
              echo "TGT_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            prod)
              echo "TGT_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ Invalid target_env"
              exit 1
              ;;
          esac

      # ✅ Validate URLs
      - name: Validate URLs
        run: |
          if [ -z "$SRC_OIC_URL" ] || [ -z "$TGT_OIC_URL" ]; then
            echo "❌ Missing OIC URLs"
            exit 1
          fi

          echo "Source URL: $SRC_OIC_URL"
          echo "Target URL: $TGT_OIC_URL"
      # ✅ Export from Source (FIXED)
      - name: Export Integration
        run: |
          echo "Exporting from ${{ github.event.inputs.source_env }}..."

          ENCODED_ID=$(printf "%s|%s" "$INTEGRATION_NAME" "$INTEGRATION_VERSION" | sed 's/|/%7C/')

          echo "Integration ID: $ENCODED_ID"
          echo "Calling: $SRC_OIC_URL/ic/api/integration/v1/integrations/archive?integrationId=$ENCODED_ID"

          curl -v --fail \
          -u "$SRC_USER:$SRC_PASS" \
          -X GET "$SRC_OIC_URL/ic/api/integration/v1/integrations/archive?integrationId=$ENCODED_ID" \
          -H "Accept: application/octet-stream" \
          -o $EXPORT_FILE

      # ✅ Validate Export (STRICT)
      - name: Validate Export
        run: |
          echo "Validating export file..."

          if [ ! -f "$EXPORT_FILE" ]; then
            echo "❌ Export file not found"
            exit 1
          fi

          if [ ! -s "$EXPORT_FILE" ]; then
            echo "❌ Export file is EMPTY"
            exit 1
          fi

          echo "File details:"
          ls -lh $EXPORT_FILE
          file $EXPORT_FILE

          # Detect HTML error response
          if file $EXPORT_FILE | grep -i html; then
            echo "❌ Export returned HTML (likely API error)"
            cat $EXPORT_FILE
            exit 1
          fi

      # ✅ Import into Target (WITH RESPONSE CHECK)
      - name: Import Integration
        run: |
          echo "Importing to ${{ github.event.inputs.target_env }}..."

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/archive" \
          -H "Content-Type: multipart/form-data" \
          -F "file=@$EXPORT_FILE")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "❌ Import failed with status $STATUS"
            exit 1
          fi

      # ✅ Activate in Target (FIXED + DEBUG)
      - name: Activate Integration
        run: |
          echo "Activating in ${{ github.event.inputs.target_env }}..."

          ENCODED_ID=$(printf "%s|%s" "$INTEGRATION_NAME" "$INTEGRATION_VERSION" | sed 's/|/%7C/')

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED_ID/activate")

          echo "$RESPONSE"

          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "❌ Activation failed with status $STATUS"
            exit 1
          fi
