name: OIC Migration (Debug Mode - Fixed)

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source Environment (dev/sit/uat/prod)"
        required: true
        default: "uat"
      target_env:
        description: "Target Environment (dev/sit/uat/prod)"
        required: true
        default: "sit"

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Validate Inputs
      - name: Validate Environments
        run: |
          echo "Source: ${{ github.event.inputs.source_env }}"
          echo "Target: ${{ github.event.inputs.target_env }}"

          if [ "${{ github.event.inputs.source_env }}" = "${{ github.event.inputs.target_env }}" ]; then
            echo "❌ Source and Target cannot be same"
            exit 1
          fi

      # ✅ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Set Credentials
      - name: Set Credentials
        run: |
          SRC="${{ github.event.inputs.source_env }}"
          TGT="${{ github.event.inputs.target_env }}"

          case "$SRC" in
            dev)
              echo "SRC_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            sit)
              echo "SRC_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            uat)
              echo "SRC_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            prod)
              echo "SRC_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
          esac

          case "$TGT" in
            dev)
              echo "TGT_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            sit)
              echo "TGT_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            uat)
              echo "TGT_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
            prod)
              echo "TGT_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV ;;
          esac

          echo "Source URL: $SRC_OIC_URL"
          echo "Target URL: $TGT_OIC_URL"

      # ✅ Validate Source API (FIXED with -L)
      - name: Validate Source API
        run: |
          echo "Checking source connectivity..."

          curl -s -L -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations?limit=1" \
          -o src_check.txt

          cat src_check.txt

          STATUS=$(tail -n1 src_check.txt | cut -d':' -f2)

          if [ "$STATUS" != "200" ]; then
            echo "❌ Source API failed (Status: $STATUS)"
            exit 1
          fi

      # ✅ Fetch Integrations
      - name: Fetch Integrations
        run: |
          echo "Fetching integrations..."

          curl -s -L -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations?limit=1000" \
          -o response.txt

          cat response.txt

          STATUS=$(tail -n1 response.txt | cut -d':' -f2)

          if [ "$STATUS" != "200" ]; then
            echo "❌ Failed to fetch integrations (Status: $STATUS)"
            exit 1
          fi

          head -n -1 response.txt > integrations.json

          COUNT=$(jq '.items | length // 0' integrations.json)

          echo "Total integrations: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No integrations found"
            exit 1
          fi

      # ✅ Test First Integration (Debug Mode)
      - name: Test First Integration
        run: |
          set -e

          NAME=$(jq -r ".items[0].code" integrations.json | xargs)
          VERSION=$(jq -r ".items[0].version" integrations.json | xargs)

          ID="$NAME|$VERSION"
          ENCODED_ID=$(printf "%s%%7C%s" "$NAME" "$VERSION")

          echo "Testing integration: $ID"

          FILE="test.iar"

          # EXPORT
          echo "Exporting..."

          curl -s -L -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations/archive?integrationId=$ENCODED_ID" \
          -o export.txt

          cat export.txt

          STATUS=$(tail -n1 export.txt | cut -d':' -f2)

          if [ "$STATUS" != "200" ]; then
            echo "❌ Export failed (Status: $STATUS)"
            exit 1
          fi

          head -n -1 export.txt > $FILE
          file $FILE

          # IMPORT
          echo "Importing..."

          curl -s -L -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/archive" \
          -F "file=@$FILE" \
          -o import.txt

          cat import.txt

          STATUS=$(tail -n1 import.txt | cut -d':' -f2)

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "❌ Import failed (Status: $STATUS)"
            exit 1
          fi

          # ACTIVATE
          echo "Activating..."

          curl -s -L -w "\nHTTP_STATUS:%{http_code}\n" \
          -u "$TGT_USER:$TGT_PASS" \
          -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED_ID/activate" \
          -o activate.txt

          cat activate.txt

          STATUS=$(tail -n1 activate.txt | cut -d':' -f2)

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "❌ Activation failed (Status: $STATUS)"
            exit 1
          fi

          echo "✅ Debug flow completed successfully"
