name: OIC Full Migration (All Integrations)

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source Environment (dev/sit/uat/prod)"
        required: true
        default: "sit"
      target_env:
        description: "Target Environment (dev/sit/uat/prod)"
        required: true
        default: "uat"

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Validate Environments
      - name: Validate Environments
        run: |
          if [ "${{ github.event.inputs.source_env }}" = "${{ github.event.inputs.target_env }}" ]; then
            echo "❌ Source and Target cannot be same"
            exit 1
          fi

      # ✅ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Set SOURCE credentials
      - name: Set Source Credentials
        run: |
          case "${{ github.event.inputs.source_env }}" in
            dev)
              echo "SRC_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            sit)
              echo "SRC_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            uat)
              echo "SRC_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            prod)
              echo "SRC_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "SRC_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "SRC_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ Invalid source_env"
              exit 1
              ;;
          esac

      # ✅ Set TARGET credentials
      - name: Set Target Credentials
        run: |
          case "${{ github.event.inputs.target_env }}" in
            dev)
              echo "TGT_OIC_URL=${{ secrets.DEV_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.DEV_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.DEV_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            sit)
              echo "TGT_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            uat)
              echo "TGT_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            prod)
              echo "TGT_OIC_URL=${{ secrets.PROD_OIC_URL }}" >> $GITHUB_ENV
              echo "TGT_USER=${{ secrets.PROD_OIC_USERNAME }}" >> $GITHUB_ENV
              echo "TGT_PASS=${{ secrets.PROD_OIC_PASSWORD }}" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ Invalid target_env"
              exit 1
              ;;
          esac

      # ✅ Fetch integrations from source
      - name: Fetch Integrations
        run: |
          echo "Fetching integrations from source..."

          curl --fail -s \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations?limit=1000" \
          -o integrations.json

          COUNT=$(jq '.items | length' integrations.json)

          echo "Total integrations found: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No integrations found in source"
            exit 1
          fi

      # ✅ Export → Import → Activate with verification
      - name: Migrate Integrations
        run: |
          set -euo pipefail

          COUNT=$(jq '.items | length' integrations.json)

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".items[$i].code" integrations.json | xargs)
            VERSION=$(jq -r ".items[$i].version" integrations.json | xargs)

            ID="$NAME|$VERSION"
            ENCODED_ID=$(printf "%s%%7C%s" "$NAME" "$VERSION")

            echo "========================================"
            echo "Processing: $ID"
            echo "========================================"

            FILE="$NAME-$VERSION.iar"

            # 🔹 EXPORT
            echo "Exporting..."

            curl --fail -s \
            -u "$SRC_USER:$SRC_PASS" \
            "$SRC_OIC_URL/ic/api/integration/v1/integrations/archive?integrationId=$ENCODED_ID" \
            -H "Accept: application/octet-stream" \
            -o "$FILE"

            if [ ! -s "$FILE" ]; then
              echo "❌ Export failed (empty file): $ID"
              exit 1
            fi

            TYPE=$(file "$FILE")
            echo "File type: $TYPE"

            if echo "$TYPE" | grep -i "html"; then
              echo "❌ Export returned HTML → wrong URL or auth issue"
              cat "$FILE"
              exit 1
            fi

            # 🔹 IMPORT
            echo "Importing..."

            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
            -u "$TGT_USER:$TGT_PASS" \
            -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/archive" \
            -H "Content-Type: multipart/form-data" \
            -F "file=@$FILE")

            echo "$RESPONSE"

            STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

            if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
              echo "❌ Import failed: $ID"
              exit 1
            fi

            # 🔹 VERIFY IMPORT
            echo "Verifying import in target..."

            CHECK=$(curl -s \
            -u "$TGT_USER:$TGT_PASS" \
            "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED_ID")

            echo "$CHECK" | jq '.code' || true

            if echo "$CHECK" | grep -q "error"; then
              echo "❌ Integration not found after import: $ID"
              exit 1
            fi

            # 🔹 ACTIVATE
            echo "Activating..."

            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" \
            -u "$TGT_USER:$TGT_PASS" \
            -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED_ID/activate")

            echo "$RESPONSE"

            STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

            if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
              echo "❌ Activation failed: $ID"
              exit 1
            fi

            # 🔹 VERIFY ACTIVATION
            echo "Checking activation status..."

            STATUS_CHECK=$(curl -s \
            -u "$TGT_USER:$TGT_PASS" \
            "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED_ID")

            echo "$STATUS_CHECK" | jq '.status' || true

            echo "✅ Completed: $ID"

          done

      # ✅ Done
      - name: Completed
        run: echo "🎉 Full OIC migration completed successfully"
