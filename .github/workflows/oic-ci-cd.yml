name: OIC Migration UAT to SIT (Auto)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # ✅ Set Credentials (HARDCODED ENV)
      - name: Set Credentials
        run: |
          echo "SRC_OIC_URL=${{ secrets.UAT_OIC_URL }}" >> $GITHUB_ENV
          echo "SRC_USER=${{ secrets.UAT_OIC_USERNAME }}" >> $GITHUB_ENV
          echo "SRC_PASS=${{ secrets.UAT_OIC_PASSWORD }}" >> $GITHUB_ENV

          echo "TGT_OIC_URL=${{ secrets.SIT_OIC_URL }}" >> $GITHUB_ENV
          echo "TGT_USER=${{ secrets.SIT_OIC_USERNAME }}" >> $GITHUB_ENV
          echo "TGT_PASS=${{ secrets.SIT_OIC_PASSWORD }}" >> $GITHUB_ENV

          echo "Source: UAT → $SRC_OIC_URL"
          echo "Target: SIT → $TGT_OIC_URL"

      # ✅ Validate Connections
      - name: Validate Source & Target
        run: |
          echo "🔍 Validating SOURCE (UAT)..."
          SRC_STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations")

          echo "SOURCE HTTP STATUS: $SRC_STATUS"

          echo "🔍 Validating TARGET (SIT)..."
          TGT_STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
          -u "$TGT_USER:$TGT_PASS" \
          "$TGT_OIC_URL/ic/api/integration/v1/integrations")

          echo "TARGET HTTP STATUS: $TGT_STATUS"

      # ✅ Fetch Integrations
      - name: Fetch Integrations from UAT
        run: |
          echo "📥 Fetching integrations from UAT..."

          curl -s -L \
          -u "$SRC_USER:$SRC_PASS" \
          "$SRC_OIC_URL/ic/api/integration/v1/integrations?limit=1000" \
          -o integrations.json

          COUNT=$(jq '.items | length // 0' integrations.json)
          echo "Total integrations found: $COUNT"

      # ✅ Export Integrations
      - name: Export Integrations
        run: |
          mkdir -p exports

          COUNT=$(jq '.items | length // 0' integrations.json)

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".items[$i].code" integrations.json | xargs)
            VERSION=$(jq -r ".items[$i].version" integrations.json | xargs)

            ID="$NAME|$VERSION"
            ENCODED=$(printf "%s%%7C%s" "$NAME" "$VERSION")

            FILE="exports/$NAME-$VERSION.iar"

            echo "📦 Exporting: $ID"

            STATUS=$(curl -s -L -o "$FILE" -w "%{http_code}" \
            -u "$SRC_USER:$SRC_PASS" \
            "$SRC_OIC_URL/ic/api/integration/v1/integrations/archive?integrationId=$ENCODED")

            if [ "$STATUS" != "200" ]; then
              echo "❌ Export failed: $ID"
              echo "$ID" >> failed_exports.txt
              continue
            fi

            if [ ! -s "$FILE" ]; then
              echo "❌ Empty export: $ID"
              echo "$ID" >> failed_exports.txt
              continue
            fi

            echo "✅ Exported: $ID"
          done

      # ✅ Upload Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oic-exports
          path: exports/

      # ✅ Import Integrations into SIT (FIXED)
      - name: Import Integrations to SIT
        run: |
          FILES=$(ls exports/*.iar 2>/dev/null || true)

          if [ -z "$FILES" ]; then
            echo "⚠️ No files to import"
            exit 0
          fi

          for FILE in $FILES; do
            echo "📤 Importing: $FILE"

            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -u "$TGT_USER:$TGT_PASS" \
            -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/archive" \
            -F "file=@$FILE")

            if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
              echo "❌ Import failed: $FILE"
              echo "$FILE" >> failed_imports.txt
              continue
            fi

            echo "✅ Imported: $FILE"
          done

      # ✅ Activate Integrations (FIXED)
      - name: Activate Integrations in SIT
        run: |
          FILES=$(ls exports/*.iar 2>/dev/null || true)

          if [ -z "$FILES" ]; then
            echo "⚠️ No files to activate"
            exit 0
          fi

          for FILE in $FILES; do
            BASENAME=$(basename "$FILE" .iar)

            NAME=$(echo "$BASENAME" | cut -d'-' -f1)
            VERSION=$(echo "$BASENAME" | cut -d'-' -f2)

            ENCODED=$(printf "%s%%7C%s" "$NAME" "$VERSION")

            echo "⚡ Activating: $NAME|$VERSION"

            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -u "$TGT_USER:$TGT_PASS" \
            -X POST "$TGT_OIC_URL/ic/api/integration/v1/integrations/$ENCODED/activate")

            if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
              echo "❌ Activation failed: $NAME|$VERSION"
              echo "$NAME|$VERSION" >> failed_activation.txt
              continue
            fi

            echo "✅ Activated: $NAME|$VERSION"
          done

      # ✅ Summary
      - name: Summary
        run: |
          echo "================ SUMMARY ================"

          echo "❌ Failed Exports:"
          cat failed_exports.txt 2>/dev/null || echo "None"

          echo "❌ Failed Imports:"
          cat failed_imports.txt 2>/dev/null || echo "None"

          echo "❌ Failed Activations:"
          cat failed_activation.txt 2>/dev/null || echo "None"

          echo "========================================="
